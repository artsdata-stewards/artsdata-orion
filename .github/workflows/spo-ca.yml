name: Fetch spo-ca Events

on:
  workflow_dispatch:
  schedule:
    - cron: '18 5 * * 2'
    
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v3
        with:
          mode: "fetch-push"
          artifact: "spo-ca"
          publisher: "${{ vars.CAPACOA_BOT }}"
          page-url: "https://spo.ca/tribe_events-sitemap.xml"
          entity-identifier: "loc"
          token: "${{ secrets.GITHUB_TOKEN }}"
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}
