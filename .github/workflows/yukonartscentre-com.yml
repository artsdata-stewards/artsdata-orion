name: Fetch yukonartscentre.com Events
# https://github.com/artsdata-stewards/source-logs/issues/41

on:
  workflow_dispatch:
  
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "fetch-push"
          artifact: "yukonartscentre.com"
          publisher: "${{ vars.CAPACOA_BOT }}"
          page-url: "https://yukonartscentre.com/wp-sitemap-posts-events-exhibitions-1.xml"
          entity-identifier: "loc"
          token: "${{ secrets.GITHUB_TOKEN }}"
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}
