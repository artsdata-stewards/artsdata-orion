name: Fetch vimhouse-ca

on:
  workflow_dispatch:
  schedule:
    - cron: '25 16 * * 4' #runs every week on thursday at 16:25 UTC

jobs:
  artsdata-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "fetch-push"
          artifact: "vimhouse-ca"
          publisher: "https://github.com/fjjulien#this"
          page-url: "https://vimhouse.ca/vim-events/"
          entity-identifier: "h3.lsow-post-title a"
          token: ${{ secrets.GITHUB_TOKEN }}
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}
