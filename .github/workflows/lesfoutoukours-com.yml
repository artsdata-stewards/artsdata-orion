name: Fetch lesfoutoukours-com Events

on:
  workflow_dispatch:
  schedule:
    - cron: '57 5 * * 3'
    
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "fetch-push"
          artifact: "lesfoutoukours-com"
          publisher: "${{ vars.CAPACOA_BOT }}"
          page-url: "https://lesfoutoukours.com/en/calendar/"
          token: "${{ secrets.GITHUB_TOKEN }}"
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}
