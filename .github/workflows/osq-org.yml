name: Fetch osq-org Events
# https://github.com/artsdata-stewards/source-logs/issues/40

on:
  workflow_dispatch:
  
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "fetch-push"
          artifact: "osq-org"
          publisher: "${{ vars.CAPACOA_BOT }}"
          page-url: "https://www.osq.org/categorie-concerts/saison-2025-2026/"
          entity-identifier: "a.concert-archive-block-btn"
          token: "${{ secrets.GITHUB_TOKEN }}"
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}