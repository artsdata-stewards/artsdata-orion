name: Fetch petittheatre-org Events

on:
  workflow_dispatch:
  schedule:
    - cron: '57 7 * * 3'
    
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v3
        with:
          mode: "fetch-push"
          artifact: "petittheatre-org"
          publisher: "${{ vars.CAPACOA_BOT }}"
          page-url: "https://petittheatre.org/tribe_events-sitemap.xml"
          entity-identifier: "loc"
          token: "${{ secrets.GITHUB_TOKEN }}"
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}
