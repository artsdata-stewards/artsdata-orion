name: Fetch porttheatre-com Events
# https://github.com/artsdata-stewards/source-logs/issues/43

on:
  workflow_dispatch:
  
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "fetch-push"
          artifact: "porttheatre-com"
          publisher: "${{ vars.CAPACOA_BOT }}"
          page-url: "https://www.porttheatre.com/events/"
          entity-identifier: "a.more"
          token: "${{ secrets.GITHUB_TOKEN }}"
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}