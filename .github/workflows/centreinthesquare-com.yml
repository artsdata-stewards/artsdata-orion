name: Fetch centreinthesquare-com Events
# https://github.com/artsdata-stewards/source-logs/issues/46

on:
  workflow_dispatch:
  schedule:
    - cron: '20 5 * * 3'
  
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "fetch-push"
          artifact: "centreinthesquare-com"
          publisher: "${{ vars.CAPACOA_BOT }}"
          page-url: "https://centreinthesquare.com/"
          token: "${{ secrets.GITHUB_TOKEN }}"
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}
