name: Fetch quoivivrerimouski-ca Events

# on:
#  workflow_dispatch:
#  schedule:
#    - cron: '57 4 * * 3'
    
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "fetch-push"
          artifact: "quoivivrerimouski-ca"
          publisher: "${{ vars.CAPACOA_BOT }}"
          page-url: "https://quoivivrerimouski.ca/"
          token: "${{ secrets.GITHUB_TOKEN }}"
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}
