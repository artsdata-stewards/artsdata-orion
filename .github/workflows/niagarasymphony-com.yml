name: Fetch niagarasymphony-com Events

on:
  workflow_dispatch:
  schedule:
    - cron: '50 6 * * 2'
    
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v3
        with:
          mode: "fetch-push"
          artifact: "niagarasymphony-com"
          publisher: "${{ vars.CAPACOA_BOT }}"
          token: "${{ secrets.GITHUB_TOKEN }}"
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}
