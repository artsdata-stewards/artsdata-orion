name: Fetch tidemarktheatre-com Events
# https://github.com/artsdata-stewards/source-logs/issues/44

on:
  workflow_dispatch:
  
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "fetch-push"
          artifact: "tidemarktheatre-com"
          publisher: "${{ vars.CAPACOA_BOT }}"
          page-url: "https://tidemarktheatre.com"
          entity-identifier: "a.pp-content-grid-more.pp-more-link-button"
          token: "${{ secrets.GITHUB_TOKEN }}"
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}