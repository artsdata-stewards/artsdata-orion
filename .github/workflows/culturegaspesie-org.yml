# To delete
name: Fetch culturegaspesie-org Events

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '45 2 * * 2'
    
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v3
        with:
          mode: "fetch-push"
          artifact: "culturegaspesie-org"
          publisher: "${{ vars.CAPACOA_BOT }}"
          page-url: "https://centredecreationdiffusiondegaspe.com/"
          token: "${{ secrets.GITHUB_TOKEN }}"
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}
