name: Fetch astortheatre-ca Events

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 3'
  
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "fetch-push"
          artifact: "astortheatre-ca"
          publisher: "${{ vars.CAPACOA_BOT }}"
          page-url: "https://astortheatre.ca/wp-sitemap-posts-tribe_events-1.xml"
          entity-identifier: "loc"
          token: "${{ secrets.GITHUB_TOKEN }}"
          html-extract-config: |
            {
              "entity_type": "http://schema.org/Event",
              "extract": {
                "http://schema.org/keywords": {
                  "xpath": "normalize-space(//span[@class='tribe_events_cat-events'])",
                  "array": "true"
                }
              }
            }
