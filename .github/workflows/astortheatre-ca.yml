name: Fetch astortheatre-ca Events

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 3'
  
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "fetch-push"
          artifact: "astortheatre-ca"
          publisher: "${{ vars.CAPACOA_BOT }}"
          page-url: "https://astortheatre.ca/live-performances/"
          entity-identifier: "loc"
          token: "${{ secrets.GITHUB_TOKEN }}"
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}
